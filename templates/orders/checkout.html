{% extends "base.html" %}
{% block content %}

<div class="pro-section glass">

<h3 class="mb-3 fw-bold">Checkout</h3>

<form method="post" novalidate>
{% csrf_token %}

<div class="mb-3">
<label>Full Name</label>
<input type="text" name="full_name"
class="form-control"
value="{{ profile.full_name|default:'' }}" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email"
class="form-control"
value="{{ user.email }}"
pattern="^[\w\.-]+@[\w\.-]+\.\w+$" required>
<small class="text-muted">Enter a valid email</small>
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" name="phone"
class="form-control"
value="{{ profile.phone|default:'' }}"
pattern="^[6-9]\d{9}$" required>
</div>

<div class="mb-3">
<label>Address</label>
<textarea name="address"
class="form-control"
required>{{ profile.address|default:'' }}</textarea>
</div>

<button class="btn btn-primary w-100 mt-3">
Place Order
</button>

</form>

</div>

{% endblock %}
